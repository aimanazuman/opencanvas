# docker-compose.prod.yml
# Usage:
#   1. Copy .env.prod.example to .env.prod and fill in your values
#   2. docker compose --env-file .env.prod -f docker-compose.prod.yml up -d

services:
  # Reverse Proxy + TLS
  traefik:
    image: traefik:v3.6.10
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    restart: unless-stopped
    networks:
      - web

  # MySQL Database
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_DATABASE: opencanvas_db
    secrets:
      - db_password
    volumes:
      - /var/data/opencanvas/mysql:/var/lib/mysql
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    secrets:
      - db_password
      - django_secret_key
      - smtp_password
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=${DOMAIN},backend
      - DB_NAME=opencanvas_db
      - DB_USER=root
      - DB_PASSWORD_FILE=/run/secrets/db_password
      - DB_HOST=db
      - DB_PORT=3306
      - SECRET_KEY_FILE=/run/secrets/django_secret_key
      - CORS_ALLOWED_ORIGINS=https://${DOMAIN}
      - FRONTEND_URL=https://${DOMAIN}
      - EMAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=587
      - EMAIL_USE_TLS=True
      - EMAIL_HOST_USER=${SMTP_USER}
      - EMAIL_HOST_PASSWORD_FILE=/run/secrets/smtp_password
      - DEFAULT_FROM_EMAIL=OpenCanvas <${SMTP_USER}>
    volumes:
      - /var/data/opencanvas/media:/app/media
      - /var/data/opencanvas/static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - web
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/media`))"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      - "traefik.http.routers.backend.priority=100"
      - "traefik.docker.network=opencanvas_web"

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - REACT_APP_API_URL=https://${DOMAIN}/api
    restart: unless-stopped
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      - "traefik.http.routers.frontend.priority=1"

# Secrets
secrets:
  db_password:
    file: ~/secrets/db_password.txt
  django_secret_key:
    file: ~/secrets/django_secret_key.txt
  smtp_password:
    file: ~/secrets/smtp_password.txt

# Volumes
volumes:
  letsencrypt:

# Networks
networks:
  web:
    driver: bridge
  internal:
    driver: bridge
